<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova-OS // Terminal Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="terminal-body">
    <div class="crt-overlay"></div>
    <div class="scanlines"></div>

    <div class="nova-os-container">
        <!-- Sidebar: System Telemetry -->
        <aside class="system-telemetry">
            <div class="telemetry-header">SYSTEM_STATUS: <span class="status-ok">OPTIMAL</span></div>
            <div class="telemetry-grid">
                <div class="telemetry-item">
                    <label>CPU_LOAD</label>
                    <div class="bar-container"><div class="bar" style="width: 12%;"></div></div>
                </div>
                <div class="telemetry-item">
                    <label>MEM_USAGE</label>
                    <div class="bar-container"><div class="bar" style="width: 45%;"></div></div>
                </div>
            </div>

            <div class="telemetry-stats">
                <div class="stat-box">
                    <span class="stat-label">PROJECT_FRAGMENTS</span>
                    <span class="stat-value">06</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">UPTIME</span>
                    <span class="stat-value">256d</span>
                </div>
            </div>

            <div class="system-logs" id="systemLogs">
                <div class="log-line">> SECURE_LINK_ESTABLISHED</div>
                <div class="log-line">> ENCRYPTION: AES-256</div>
            </div>
        </aside>

        <!-- Main Terminal -->
        <main class="terminal-core">
            <div class="terminal-header">
                <div class="os-brand">NOVA-OS v4.2.0_L_ABITI</div>
                <div class="os-time" id="osTime">00:00:00</div>
            </div>

            <div class="terminal-output" id="terminalOutput">
                <div class="boot-sequence">
                    <p class="boot-line">INIT_SYSTEM_BOOT...</p>
                    <p class="boot-line">LOAD_KERNEL_MODULES [OK]</p>
                    <p class="boot-line">IDENTIFYING_ENGINEER: <span class="highlight">LEUL_ABITI</span></p>
                    <p class="boot-line">ACCESS_GRANTED. WELCOME BACK.</p>
                    <p class="boot-line mt-1">Type 'help' for available commands.</p>
                </div>
            </div>

            <div class="terminal-input-wrapper">
                <span class="prompt">nova@root:~$</span>
                <input type="text" id="terminalInput" autofocus spellcheck="false" autocomplete="off">
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
